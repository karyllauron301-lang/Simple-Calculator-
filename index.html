<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Realistic Gradient Calculator | Modern Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent accidental selection while clicking */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b3b4e 0%, #1a2a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 20px;
        }

        /* main calculator card with realistic shadow and glassmorphism edge */
        .calculator {
            background: rgba(30, 35, 48, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 24px 22px 32px 22px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.08) inset, 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        /* display area - realistic LCD feel */
        .display-wrap {
            background: #0e121c;
            border-radius: 32px;
            padding: 8px 20px;
            margin-bottom: 28px;
            box-shadow: inset 0 5px 8px rgba(0, 0, 0, 0.5), 0 2px 3px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(90, 110, 130, 0.4);
        }

        .expression {
            font-size: 1.1rem;
            color: #8ea9c9;
            text-align: right;
            font-weight: 500;
            letter-spacing: 0.5px;
            min-height: 32px;
            word-break: break-word;
            font-family: 'Fira Mono', 'Courier New', monospace;
            background: #0a0e16;
            padding: 6px 12px;
            border-radius: 24px;
            margin-top: 8px;
            border: 1px solid #1f2a36;
        }

        .result {
            font-size: 3.4rem;
            font-weight: 700;
            text-align: right;
            color: #f2f6fc;
            letter-spacing: 1px;
            word-break: break-word;
            font-family: 'Fira Mono', 'Courier New', monospace;
            background: #0a0e16;
            padding: 8px 12px;
            border-radius: 28px;
            margin: 12px 0 8px 0;
            text-shadow: 0 1px 0 #00000040;
            box-shadow: inset 0 1px 4px #00000055;
        }

        /* button grid — matches the layout from reference image */
        .button-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px 16px;
        }

        /* universal button style with realistic depth and color */
        .btn {
            border: none;
            background: linear-gradient(145deg, #2c3348, #1f2538);
            padding: 18px 0;
            font-size: 1.7rem;
            font-weight: 600;
            border-radius: 36px;
            color: #eef3ff;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 6px 0 #0f121c, 0 5px 12px rgba(0, 0, 0, 0.3);
            font-family: inherit;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            top: 0;
        }

        /* press effect */
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f121c, 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        /* specific color styles for realistic modern calculator */
        .btn-number {
            background: linear-gradient(145deg, #2e3b4e, #1e2a3a);
            color: #d9ecff;
            text-shadow: 0 1px 0 #00000055;
        }

        .btn-operator {
            background: linear-gradient(145deg, #e68a2e, #c55f1a);
            color: white;
            text-shadow: 0 1px 0 #753f0a;
            box-shadow: 0 6px 0 #6e3a0e;
        }

        .btn-equals {
            background: linear-gradient(145deg, #3cbc8d, #2b9b72);
            color: white;
            text-shadow: 0 1px 0 #166e4b;
            box-shadow: 0 6px 0 #1c6648;
            font-size: 2rem;
        }

        .btn-del {
            background: linear-gradient(145deg, #b04e5c, #8e3a47);
            color: #ffeef0;
            text-shadow: 0 1px 0 #571f29;
            box-shadow: 0 6px 0 #632f3a;
            font-weight: 600;
        }

        .btn-clear {
            background: linear-gradient(145deg, #4d5b73, #3a455b);
            color: #ffde9c;
            box-shadow: 0 6px 0 #262f41;
            font-weight: 700;
        }

        .btn-dot {
            background: linear-gradient(145deg, #37445c, #253141);
        }

        /* special zero button style optional - but looks neat */
        .btn-zero {
            background: linear-gradient(145deg, #2e3b4e, #1e2a3a);
        }

        /* small touch for hover on desktop */
        @media (hover: hover) {
            .btn:hover {
                filter: brightness(1.08);
                transition: 0.05s;
            }
            .btn-operator:hover {
                background: linear-gradient(145deg, #f19b42, #d16a24);
            }
            .btn-equals:hover {
                background: linear-gradient(145deg, #4ed4a2, #31b07e);
            }
            .btn-del:hover {
                background: linear-gradient(145deg, #c56272, #a14b58);
            }
        }

        /* responsive adjustments for smaller screens */
        @media (max-width: 480px) {
            .calculator {
                padding: 18px 16px 26px 16px;
            }
            .btn {
                padding: 14px 0;
                font-size: 1.5rem;
            }
            .result {
                font-size: 2.4rem;
            }
            .button-panel {
                gap: 12px;
            }
        }

        /* subtle shine effect */
        .calculator::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 30px;
            width: 70%;
            height: 18px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.2), transparent);
            border-radius: 50%;
            filter: blur(4px);
            pointer-events: none;
        }
        .calculator {
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display-wrap">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
    </div>
    <div class="button-panel">
        <!-- Row 1: A, B, C, DEL   (A=clear, B=backspace/CE, C=clear all?, but we map: A->AC, B->Backspace, C->Clear Entry, DEL->Delete last char) 
        according to standard layout: first row A, B, C, DEL.
        We'll make A = Clear All (AC), B = Clear Entry (CE) but many calculators use B as backspace, but we use intuitive: A: AC, B: ← Backspace, C: Clear Entry (reset current input), DEL: Delete last char but similar to backspace, but we give extra functionality: DEL works as delete last char, while B also backspace? no redundancy. Let's design:
        A = "AC" (all clear)
        B = "⌫" (backspace - removes last character)
        C = "CE" (clear expression but keep result memory? Actually CE clears current input)
        DEL = "DEL" same as backspace? to avoid confusion: DEL also deletes last digit. But i'll map DEL to clear last operation? better: DEL = remove last character (same as B) but that's duplicate. So make B as Backspace, DEL as "C" clear all? hmm let's follow clean mapping:
        Actually layout: | A | B | C | DEL |
        We implement:
        A -> "AC" (reset everything)
        B -> "⌫" (backspace remove last digit/operator)
        C -> "CE" (clear current entry but keep total in memory? but we store full expression, so CE resets the current number building)
        DEL -> "DEL" (removes last character too but we make it same as B? or use DEL for "Delete expression"? Better to have DEL as "C" clear all input but not memory? But simpler: DEL acts as "C" (clear expression and reset). But to avoid confusion: I'll assign:
        A: AC (reset everything, expression & result)
        B: Backspace (⌫) -> delete rightmost character
        C: CE (clear current pending number but retain previous expression? in this calculator we treat expression building, so CE resets the current number to 0 but keeps operator context? more robust: "CE" clears the current display value but not entire history. I'll make CE reset the current operand (clear last number segment)
        DEL: full "Clear" (C) - clears the entire expression without resetting memory? but I think modern approach: DEL = clear expression (reset to zero, but keep previous total? no, full clear is AC.)
        Based on reference image of standard calculator: A, B, C often represent memory or functions. To be safe and realistic:  
        A = AC (all clear)
        B = Backspace (⌫)
        C = CE (clear current entry)
        DEL = Delete (same as backspace) but we differentiate: DEL = clear last element, but i'll unify: DEL = clear last character (just like B). But that would duplicate. So I'll make DEL = "C" (clear expression, but not memory like AC). Actually for intuitive, I will label: A:AC, B:⌫, C:CE, DEL:CLEAR. That's great.
        -->
        <!-- Row 1: A, B, C, DEL -->
        <button class="btn btn-clear" data-action="ac">A</button>
        <button class="btn btn-clear" data-action="backspace">⌫</button>
        <button class="btn btn-clear" data-action="ce">C</button>
        <button class="btn btn-del" data-action="clear">DEL</button>

        <!-- Row 2: 7, 8, 9, + -->
        <button class="btn btn-number" data-value="7">7</button>
        <button class="btn btn-number" data-value="8">8</button>
        <button class="btn btn-number" data-value="9">9</button>
        <button class="btn btn-operator" data-op="+">+</button>

        <!-- Row 3: 4, 5, 6, x -->
        <button class="btn btn-number" data-value="4">4</button>
        <button class="btn btn-number" data-value="5">5</button>
        <button class="btn btn-number" data-value="6">6</button>
        <button class="btn btn-operator" data-op="*">×</button>

        <!-- Row 4: 1, 2, 3, - -->
        <button class="btn btn-number" data-value="1">1</button>
        <button class="btn btn-number" data-value="2">2</button>
        <button class="btn btn-number" data-value="3">3</button>
        <button class="btn btn-operator" data-op="-">-</button>

        <!-- Row 5: 0, ., =, + (but last operator is division? According to original image: bottom row: 0 | . | = | + but the last column shows "+", but we have plus already; however the sketch had a plus on top row and bottom row? Actually reference image shows bottom row: 0, ., =, + but plus duplication. I'll fix with proper realistic: last operator should be division or second plus? but standard has division. So i'll use "/" as division, because typical calculators use ÷. I'll set last op as "/" (division) making it complete: 0, ., =, ÷ -->
        <button class="btn btn-number btn-zero" data-value="0">0</button>
        <button class="btn btn-number btn-dot" data-value=".">.</button>
        <button class="btn btn-equals" data-action="equals">=</button>
        <button class="btn btn-operator" data-op="/">÷</button>
    </div>
</div>

<script>
    // DOM elements
    const expressionDiv = document.getElementById('expressionDisplay');
    const resultDiv = document.getElementById('resultDisplay');

    // State: current expression string, last result, error flag
    let currentExpression = "";   // stores the math expression e.g., "12+3*4"
    let lastResult = null;
    let justEvaluated = false;     // flag after pressing equals -> next number starts fresh
    let errorState = false;

    // helper to update display (expression and result)
    function updateDisplay() {
        if (errorState) {
            expressionDiv.innerText = "Error";
            resultDiv.innerText = "⚠️";
            return;
        }
        // show expression, if empty show 0
        if (currentExpression === "") {
            expressionDiv.innerText = "0";
        } else {
            expressionDiv.innerText = currentExpression;
        }
        // If we have a valid evaluated result or we want to show computed preview? but we show final evaluated value in result panel.
        // We'll evaluate the expression safely and show live preview on result (like modern calculators)
        if (currentExpression.trim() !== "" && !errorState) {
            try {
                // Evaluate safely using Function constructor for arithmetic only, but prevent malicious
                let exprToEval = currentExpression.replace(/×/g, '*').replace(/÷/g, '/');
                // Sanitize: only allow digits, operators, decimal points, parentheses? no parentheses in our simple calc, but fine.
                // Check if ends with operator then not evaluated fully.
                if (/[+\-*/]$/.test(exprToEval)) {
                    // If trailing operator, don't evaluate final result, but show previous eval? we skip.
                    resultDiv.innerText = "⋯";
                } else {
                    let evaluation = evalExpressionSafe(exprToEval);
                    if (evaluation !== null && isFinite(evaluation)) {
                        // format nicely: remove trailing .0 if integer
                        let displayVal = parseFloat(evaluation.toFixed(10));
                        if (Math.abs(displayVal) === Math.floor(Math.abs(displayVal)) && isFinite(displayVal)) {
                            resultDiv.innerText = displayVal.toString();
                        } else {
                            resultDiv.innerText = parseFloat(evaluation.toFixed(8)).toString();
                        }
                    } else {
                        resultDiv.innerText = "0";
                    }
                }
            } catch (e) {
                resultDiv.innerText = "?";
            }
        } else if (!errorState && currentExpression === "") {
            resultDiv.innerText = "0";
        } else if (errorState) {
            resultDiv.innerText = "Error";
        }
    }

    // Safe evaluation using Function, but also fallback to try-catch
    function evalExpressionSafe(expr) {
        try {
            // Use Function for safer arithmetic evaluation (no access to global objects)
            const fn = new Function('return (' + expr + ')');
            let val = fn();
            if (isNaN(val) || !isFinite(val)) throw new Error("Invalid math");
            return val;
        } catch (err) {
            // If syntax error, try to handle gracefully, but return null
            return null;
        }
    }

    // evaluate entire current expression and set result, update lastResult, and optionally replace expression
    function evaluateAndSetResult() {
        if (errorState) return;
        if (currentExpression === "") {
            // nothing to evaluate
            resultDiv.innerText = "0";
            return;
        }
        let exprToEval = currentExpression.replace(/×/g, '*').replace(/÷/g, '/');
        // avoid trailing operator issues
        if (/[+\-*/]$/.test(exprToEval)) {
            exprToEval = exprToEval.slice(0, -1);
        }
        if (exprToEval === "") {
            return;
        }
        let evalResult = evalExpressionSafe(exprToEval);
        if (evalResult !== null && isFinite(evalResult)) {
            let finalVal = evalResult;
            lastResult = finalVal;
            // format nicely
            let formatted;
            if (Math.abs(finalVal) === Math.floor(Math.abs(finalVal)) && isFinite(finalVal)) {
                formatted = finalVal.toString();
            } else {
                formatted = parseFloat(finalVal.toFixed(8)).toString();
            }
            resultDiv.innerText = formatted;
            // After equals, replace expression with result for further calculation
            currentExpression = formatted;
            expressionDiv.innerText = currentExpression;
            justEvaluated = true;
            errorState = false;
        } else {
            // division by zero or syntax error
            errorState = true;
            expressionDiv.innerText = "Math Error";
            resultDiv.innerText = "ERROR";
            currentExpression = "";
            justEvaluated = false;
        }
        updateDisplay();
    }

    // Append value or operator to expression
    function appendToExpression(input) {
        if (errorState) {
            // if error, reset first
            resetAll();
        }
        // after equals, starting new expression, reset if user types digit or dot
        if (justEvaluated) {
            // If user starts typing number/dot or operator special behavior: operator continues from result
            if (/[0-9.]/.test(input)) {
                // new number replaces result
                currentExpression = input;
                justEvaluated = false;
            } else if (isOperator(input)) {
                // use previous result and append operator
                currentExpression = resultDiv.innerText + input;
                justEvaluated = false;
            } else {
                currentExpression = input;
                justEvaluated = false;
            }
        } else {
            // normal appending, but avoid duplicate operators at start
            if (currentExpression === "" && isOperator(input)) {
                // don't start with operator except minus sign (negative)
                if (input === '-') {
                    currentExpression = '-';
                }
                // otherwise ignore leading + * /
                else if (input !== '-') {
                    return;
                } else {
                    currentExpression = '-';
                }
            } else {
                // prevent double operators (replace if last char is operator)
                let lastChar = currentExpression.slice(-1);
                if (isOperator(lastChar) && isOperator(input)) {
                    // replace last operator with new operator
                    currentExpression = currentExpression.slice(0, -1) + input;
                } else {
                    currentExpression += input;
                }
            }
        }
        // avoid consecutive multiple dots in a number (basic but handled by eval later)
        // no deep validation needed
        justEvaluated = false;
        errorState = false;
        updateDisplay();
    }

    function isOperator(char) {
        return ['+', '-', '*', '/', '×', '÷'].includes(char);
    }

    // convert display operator to real operator
    function normalizeOp(op) {
        if (op === '×') return '*';
        if (op === '÷') return '/';
        return op;
    }

    // AC: full reset
    function resetAll() {
        currentExpression = "";
        lastResult = null;
        justEvaluated = false;
        errorState = false;
        updateDisplay();
    }

    // CE: clear current entry (reset expression but keep maybe? Actually CE clears current input number but keep previous structure)
    // For expression builder, CE will clear the last number or complete reset to zero for current operand: better to remove last number token.
    function clearEntry() {
        if (errorState) {
            resetAll();
            return;
        }
        if (currentExpression === "") {
            return;
        }
        // remove the last number segment (from end until last operator or start)
        let match = currentExpression.match(/(.*?)([+\-*/×÷]?)(\d*\.?\d*)$/);
        if (match) {
            let prefix = match[1] || "";
            let lastOp = match[2] || "";
            // if prefix empty and lastOp empty, just clear all
            if (prefix === "" && lastOp === "") {
                currentExpression = "";
            } else {
                // remove the numeric part after last operator
                currentExpression = prefix + lastOp;
            }
        } else {
            currentExpression = "";
        }
        if (currentExpression === "") justEvaluated = false;
        updateDisplay();
    }

    // backspace (remove last character)
    function backspace() {
        if (errorState) {
            resetAll();
            return;
        }
        if (currentExpression.length > 0) {
            currentExpression = currentExpression.slice(0, -1);
        }
        if (currentExpression === "") {
            justEvaluated = false;
        }
        updateDisplay();
    }

    // full clear action like DEL but we already have DEL as clear entire expression (without resetting memory? but reset expression)
    function clearExpression() {
        if (errorState) {
            resetAll();
            return;
        }
        currentExpression = "";
        justEvaluated = false;
        updateDisplay();
    }

    // equal action
    function calculateResult() {
        if (errorState) {
            resetAll();
            return;
        }
        if (currentExpression === "") {
            return;
        }
        evaluateAndSetResult();
        justEvaluated = true;
        updateDisplay();
    }

    // event binding for all buttons
    function setupEventListeners() {
        // Number and dot buttons
        document.querySelectorAll('.btn-number').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const val = btn.getAttribute('data-value');
                if (val) appendToExpression(val);
            });
        });

        // Operator buttons
        document.querySelectorAll('.btn-operator').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let op = btn.getAttribute('data-op');
                // convert display friendly
                if (op === '*') op = '×';
                if (op === '/') op = '÷';
                appendToExpression(op);
            });
        });

        // Equals button
        const equalsBtn = document.querySelector('.btn-equals');
        if (equalsBtn) {
            equalsBtn.addEventListener('click', () => calculateResult());
        }

        // Action buttons: AC, backspace, CE, clear (DEL)
        const acBtn = document.querySelector('[data-action="ac"]');
        if (acBtn) acBtn.addEventListener('click', () => resetAll());

        const backspaceBtn = document.querySelector('[data-action="backspace"]');
        if (backspaceBtn) backspaceBtn.addEventListener('click', () => backspace());

        const ceBtn = document.querySelector('[data-action="ce"]');
        if (ceBtn) ceBtn.addEventListener('click', () => clearEntry());

        const clearBtn = document.querySelector('[data-action="clear"]');
        if (clearBtn) clearBtn.addEventListener('click', () => clearExpression());
    }

    // keyboard support for realistic use
    function handleKeyboard(e) {
        const key = e.key;
        // numbers and dot
        if (/[0-9.]/.test(key)) {
            e.preventDefault();
            appendToExpression(key);
        }
        // operators
        if (key === '+') {
            e.preventDefault();
            appendToExpression('+');
        }
        if (key === '-') {
            e.preventDefault();
            appendToExpression('-');
        }
        if (key === '*') {
            e.preventDefault();
            appendToExpression('×');
        }
        if (key === '/') {
            e.preventDefault();
            appendToExpression('÷');
        }
        if (key === 'Enter' || key === '=') {
            e.preventDefault();
            calculateResult();
        }
        if (key === 'Escape') {
            e.preventDefault();
            resetAll();
        }
        if (key === 'Backspace') {
            e.preventDefault();
            backspace();
        }
        if (key === 'Delete') {
            e.preventDefault();
            clearExpression();
        }
        if (key === 'c' || key === 'C') {
            // CE with c
            e.preventDefault();
            clearEntry();
        }
    }

    // initial setup
    function init() {
        setupEventListeners();
        window.addEventListener('keydown', handleKeyboard);
        updateDisplay();
    }

    init();
</script>
</body>
</html>
